<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCL Interface</title>

<style>
:root{
  --bg:#0b1d51;
  --bg2:#091442;
  --accent:#00e0ff;
  --card:rgba(255,255,255,0.06);
  --text:#fff;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Arial, sans-serif}

body{
  background:radial-gradient(circle at top,var(--bg),var(--bg2));
  color:var(--text);
}

header{
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

header h1{
  font-size:20px;
  letter-spacing:2px;
}

nav{
  display:flex;
  gap:20px;
  font-size:14px;
  opacity:.8;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.section{
  margin-bottom:40px;
}

.section h2{
  margin-bottom:15px;
  color:var(--accent);
}

.match{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  margin-bottom:15px;
  backdrop-filter:blur(12px);
}

.teams{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.team{
  font-size:18px;
}

.score{
  font-size:32px;
  font-weight:bold;
}

.details{
  margin-top:10px;
  font-size:14px;
  opacity:.8;
}

/* FINAL */
.final{
  padding:25px;
  border-radius:16px;
  background:linear-gradient(135deg,#001a66,#0033cc);
}

.final h3{
  margin-bottom:15px;
}

.lineups{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}

.team-box{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:12px;
}

.player{
  padding:5px 0;
  font-size:14px;
}

/* MOBILE */
@media(max-width:700px){
  .teams{flex-direction:column;gap:10px}
  .lineups{grid-template-columns:1fr}
}

</style>
</head>

<body>

<header>
<h1>CHAMPIONS LEAGUE</h1>
<nav>
<div>Matches</div>
<div>Stats</div>
<div>Teams</div>
<div>Final</div>
</nav>
</header>

<div class="container">

<!-- ACHTELFINALE -->
<div class="section">
<h2>Achtelfinale</h2>

<div class="match">
<div class="teams">
<div class="team">Radion</div>
<div class="score">4 - 0</div>
<div class="team">Abdi</div>
</div>
<div class="details">AGG: 4-1 • Tore: 25', 62', 71', 90+4'</div>
</div>

</div>

<!-- LIGAPHASE -->
<div class="section">
<h2>Ligaphase</h2>

<div class="match">
<div class="teams">
<div class="team">Borislav</div>
<div class="score">2 - 0</div>
<div class="team">Elias</div>
</div>
</div>

<div class="match">
<div class="teams">
<div class="team">Elias</div>
<div class="score">1 - 2</div>
<div class="team">Abdi</div>
</div>
</div>

</div>

<!-- FINAL -->
<div class="section">
<h2>Upcoming Final</h2>

<div class="final">
<h3>Montag • UCL Final</h3>

<div class="teams">
<div class="team">Galatasaray</div>
<div class="score">vs</div>
<div class="team">PSG</div>
</div>

<div class="details">Next Match • Ongoing soon</div>

<div class="lineups">

<div class="team-box">
<strong>Galatasaray</strong>
<div class="player">Radion</div>
<div class="player">Abdi</div>
</div>

<div class="team-box">
<strong>PSG</strong>
<div class="player">Elias</div>
<div class="player">Borislav</div>
</div>

</div>

</div>
</div>

</div>

</body>
</html>
